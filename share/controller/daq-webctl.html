<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAQ Controller</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --primary-color: #1a73e8;
            --success-color: #218838;
            --success-color-h: #104419;
            --danger-color: #c82333;
            --danger-color-h: #681116;
            --warning-color: #eab000;
            --warning-color-h: #755800;
            --text-main: #1a1a1a;
            --border-color: #bbb;
        }

        body {
            font-family: 'Segoe UI', 'Meiryo', 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 8px;
            font-size: 13px;
            /* 基本は太字にせず、必要な場所で個別に太字設定します */
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        h1 { margin: 0; font-size: 20px; font-weight: 800; color: var(--primary-color); }
        h2 { font-size: 15px; font-weight: 800; margin: 0 0 8px 0; border-left: 4px solid var(--primary-color); padding-left: 8px; }
        h3 { font-size: 11px; font-weight: 800; color: #555; margin: 12px 0 4px 0; }

        .container {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 8px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 4px;
            padding: 10px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.15);
            border: 1px solid #bbb;
        }

        .flex-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        
        /* 入力ボックスと標準ボタン */
        input[type="text"] {
            padding: 5px;
            border: 2px solid #aaa;
            border-radius: 3px;
            width: 70px;
            font-weight: 800;
        }

        button, input[type="submit"], input[type="button"] {
            padding: 5px 10px;
            border-radius: 3px;
            border: 1px solid #999;
            background: #fdfdfd;
            cursor: pointer;
            font-weight: 800;
            font-size: 12px;
            transition: all 0.1s;
        }

        button:hover,
        input[type="submit"]:hover,
        input[type="button"]:hover {
            background: #ddd; border-color: #666;
        }

        .btn {
            background-color: #white;
            color: black;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s; /* 色の変化を滑らかにする設定 */
        }

        .input:hover {
            background-color: #ccc;
        }

        /* 主要コマンドボタン（大きく設定） */
        .btn-cmd {
            padding: 8px 16px !important;
            font-size: 14px !important;
            min-width: 100px;
        }

        /*
        .btn-run { background-color: var(--success-color) !important; color: white !important; border: none !important; }
        .btn-stop { background-color: var(--danger-color) !important; color: white !important; border: none !important; }
        .btn-reset { background-color: var(--warning-color) !important; color: #000 !important; border: none !important; }
        */

        .btn-run { background-color: var(--success-color); color: white ; border: none; }
        .btn-run:hover { background-color: var(--success-color-h); color: white; border: none; }
        .btn-stop { background-color: var(--warning-color); color: white; border: none; }
        .btn-stop:hover { background-color: var(--warning-color-h); color: white; border: none; }
        .btn-reset { background-color: var(--danger-color); color: white; border: none; }
        .btn-reset:hover { background-color: var(--danger-color-h); color: white; border: none; }

        /* チェックボックス用ラベル（太字解除） */
        .label-normal {
            font-weight: normal !important;
            cursor: pointer;
            font-size: 13px;
        }

        .run-monitor {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            margin-top: 8px;
            background: #eee;
            padding: 8px;
            border-radius: 3px;
            font-weight: 800;
        }
        .run-monitor div { font-family: 'Consolas', monospace; font-size: 12px; }

        .arrow-separator { color: #666; font-weight: 900; font-size: 18px; margin: 0 4px; }

        select {
            width: 100%;
            /* height: 110px; */
            border: 2px solid #aaa;
            border-radius: 3px;
            font-weight: 800;
            font-size: 12px;
        }

        table {
            border-collapse: collapse;
            font-size: 11px;
            background: white;
            width: 100%;
        }
        th, td {
            border: 1px solid #999;
            padding: 3px 5px;
            text-align: center;
            font-weight: 700;
        }
        th { background: #e0e0e0; color: #000; font-weight: 800; }
        
        #main {
            height: 140px;
            overflow-y: auto;
            background: #111;
            color: #0f0; 
            padding: 6px;
            border-radius: 3px;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            font-weight: 800;
            line-height: 1.2;
        }

        .footer-info { font-size: 10px; color: #555; display: flex; gap: 10px; font-weight: 800; }
        strong { font-weight: 800; }
    </style>
</head>
<body>

    <header style="display: flex; justify-content: space-between; align-items: flex-end; padding: 0 5px;">
        <h1>DAQ Controller</h1>
        <!--
        <div class="footer-info">
            <div id="myWebSocketConnectionId">Connecting...</div>
            <div id="websocketConnectedIdList"></div>
        </div>
        -->
    </header>

    <div class="container">
        <div class="main-content">
            
            <div class="card" style="margin-bottom: 8px;">
                <h2>RUN Configuration</h2>
                <form onsubmit="return SubmitMessage('run_number')" class="flex-row">
                    <strong>RUN #:</strong>
                    <input type="text" id="run_number"/>
                    <input type="submit" value="SET"/>
                    <input type="button"  onclick="redis_incr('run_number')" value="+1"/>
                    <input type="button"  onclick="redis_get('run_number')" value="GET"/>
                    <label class="label-normal" style="margin-left:10px;">
                    <input type="checkbox" id="run-number-auto-increment-checkbox" checked/> Auto increment </label>
                </form>

                <div class="run-monitor">
                    <div id="next_run_number">Next : </div>
                    <div id="latest_run_number">Latest : </div>
                    <div id="latest_run_start_time">Start : </div>
                    <div id="latest_run_stop_time">Stop : </div>
                </div>

            </div>

            <div class="card" style="margin-bottom: 8px;">
                <h2>State Transition</h2>
                <div class="flex-row" style="margin-bottom: 12px;">
                    <label class="label-normal"><input type="checkbox" id="wait-device-ready" onchange="redis_set_checkbox_status('wait-device-ready')" checked/> Wait Device Ready </label>
                    <label class="label-normal"><input type="checkbox" id="wait-ready" onchange="redis_set_checkbox_status('wait-ready')" checked/> Wait Ready </label>
                </div>

                <div class="command-box">
                    <h3>Forward: Idle &RightArrow; Running</h3>
                    <div class="flex-row">
                        <span class="arrow-separator">Idle &RightTriangle;</span>
                        <button class="btn-cmd" onclick="redis_publish('CONNECT')">INIT DEVICE</button>
                        <span class="arrow-separator">&RightTriangle;</span>
                        <button class="btn-cmd" onclick="redis_publish('INIT TASK')">INIT TASK</button>
                        <span class="arrow-separator">&RightTriangle;</span>
                        <button class="btn-cmd btn-run" onclick="redis_publish('RUN')">RUN</button>
                        <span class="arrow-separator">&RightTriangle; Running</span>
                    </div>
                </div>

                <div class="command-box">
                    <h3>Backward: Running &LeftArrow; Idle</h3>
                    <div class="flex-row">
                        <span class="arrow-separator">Idle &LeftTriangle;</span>
                        <button class="btn-cmd btn-reset" onclick="redis_publish('RESET DEVICE')">RESET DEVICE</button>
                        <span class="arrow-separator">&LeftTriangle;</span>
                        <button class="btn-cmd" onclick="redis_publish('RESET TASK')">RESET TASK</button>
                        <span class="arrow-separator">&LeftTriangle;</span>
                        <button class="btn-cmd btn-stop" onclick="redis_publish('STOP')">STOP</button>
                        <span class="arrow-separator">&LeftTriangle; Running</span>
                    </div>
                </div>

                <div class="flex-row" style="margin-top:15px; border-top:1px solid #ddd; padding-top:10px;">
                    <button class="btn-cmd" onclick="redis_publish('END')">END PROCESS</button>
                </div>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>State Summary</h2>
                    <input type="button" id="buttonInstanceTable" onclick="ToggleInstanceTable(this)" value="DETAILS" style="padding: 2px 6px; font-size: 10px;">
                </div>
                <div class="table-wrapper" id="State Summary"></div>
                <div class="table-wrapper" id="Instance State" style="display:none; margin-top: 8px;"></div>
            </div>
        </div>

        <div class="sidebar">
            <div class="card" style="margin-bottom: 8px;">
                <h2>Control Targets</h2>
                <!--
                <p style="font-size: 10px; margin: 0 0 2px 0; font-weight:800;">Services</p>
                -->
                <select id="serviceSelector" multiple size=10></select>
                <p style="font-size: 4px;"></p>
                <!--
                <p style="font-size: 10px; margin: 8px 0 2px 0; font-weight:800;">Instances:</p>
                -->
                <select id="instanceSelector" multiple size=12></select>
            </div>

            <div class="card">
                <!--
                <h2>Messages</h2>
                <div id="main"></div>

                <p>
                <button onclick="SendMessage('{ "command": "halt" }')"
                    data-toggle="tool-tip" title="Shuttdown DAQ controller server">Halt
                </button>
                </p>
                -->

                <h2>Connections</h2>
                <div id="myWebSocketConnectionId">Connecting...</div>
                <div id="websocketConnectedIdList"></div>

            </div>

        </div>
    </div>

    <script type='text/javascript'>
        const instStateTable    = CreateInstanceStateTable();
        const stateSummaryTable = CreateStateSummaryTable();

        let path = window.location.href.replace("http://", "ws://").replace(".html", "");
        const socket = new WebSocket(path);

        socket.onopen = function() {
           this._ready = true;
           redis_set_checkbox_status('wait-device-ready');
           redis_set_checkbox_status('wait-ready');
        }

        socket.onmessage = function(e) {
           const msg = e.data;
           if (typeof msg != 'string') return;

           if (msg.startsWith('error:')) {
             alert(msg);
           } else if (msg.startsWith('My WebSocket Connection ID:')) {
             document.getElementById("myWebSocketConnectionId").innerHTML = msg;
           } else if (msg.startsWith('WebSocket Connected ID:')) {
             document.getElementById("websocketConnectedIdList").innerHTML = msg;
           } else {
               try {
                   const obj = JSON.parse(msg);
                   if (obj.type=='error') {
                       alert(obj.value);
                   } else if (obj.type=='set run_number') {
                       SetRunNumber(obj.value);
                   } else if (obj.type=='set latest_run_number') {
                       SetLatestRunNumber(obj.value); 
                   } else if (obj.type=='state-summary-table') {
                       UpdateSummaryTable(obj);
                   }
               } catch(err) {
                   console.log("Msg error:", err);
               }
           }
        }

        function CreateInstanceStateTable() {
            const table = document.createElement('table');
            const thead = document.createElement('thead');
            const tbody = document.createElement('tbody');
            table.appendChild(thead); table.appendChild(tbody);
            document.getElementById('Instance State').appendChild(table);
            const hrow = document.createElement('tr');
            ["Service", "Instance", "State", "Update"].forEach(text => {
                const th = document.createElement('th'); th.innerHTML = text; hrow.appendChild(th);
            });
            thead.appendChild(hrow);
            return table;
        }

        function CreateStateSummaryTable() {
            const table = document.createElement('table');
            const thead = document.createElement('thead');
            const tbody = document.createElement('tbody');
            table.appendChild(thead); table.appendChild(tbody);
            document.getElementById('State Summary').appendChild(table);
            const hrow = document.createElement('tr');
            const headers = ["Service",
                             "<div style='color: gray'>N</div>",
                             "UD", "Ok", "Err",
                             "<div style='color: #c82333'>Idle</div>",
                             "I-D", "Init", "Bind", "Bnd", "Conn", "D-R", "I-T", "Rdy",
                             "<div style='color: #218838'>Run</div>",
                             "R-T", "R-D", "Exit", "Update"];
            headers.forEach(text => {
                const th = document.createElement('th'); th.innerHTML = text; hrow.appendChild(th);
            });
            thead.appendChild(hrow);
            return table;
        }

        function redis_get(arg) { SendMessage(JSON.stringify({ command: "redis-get", value: arg })); }
        function redis_incr(arg) { SendMessage(JSON.stringify({ command: "redis-incr", value: arg })); }
        function redis_set(key, value) { SendMessage(JSON.stringify({ command: "redis-set", name: key, value: value })); }
        function redis_set_checkbox_status(key) { redis_set(key, document.getElementById(key).checked.toString()); }

        function redis_publish(arg) {
            if (arg == "RUN") {
                document.getElementById('latest_run_start_time').innerHTML = 'START : ' + new Date().toLocaleTimeString();
                document.getElementById('latest_run_stop_time').innerHTML = 'STOP : ';
            } else if (arg == "STOP") {
                document.getElementById('latest_run_stop_time').innerHTML = 'STOP : ' + new Date().toLocaleTimeString();
                if (document.getElementById('run-number-auto-increment-checkbox').checked) redis_incr('run_number');
            }
            const srv = Array.from(document.getElementById('serviceSelector').options).filter(o => o.selected && !o.disabled).map(o => o.text);
            const inst = Array.from(document.getElementById('instanceSelector').options).filter(o => o.selected && !o.disabled).map(o => o.text);
            SendMessage(JSON.stringify({ command: 'redis-publish', value: arg, services: srv, instances: inst }));
        }

        function SendMessage(arg) { if (socket && socket.readyState === WebSocket.OPEN) socket.send(arg); }
        function SetLatestRunNumber(arg) { document.getElementById("latest_run_number").innerHTML = 'Latest : ' + arg; }
        function SetRunNumber(arg) {
            document.getElementById("run_number").value = arg; 
            document.getElementById("next_run_number").innerHTML = 'Next : ' + arg; 
        }

        function SubmitMessage(arg) {
            const val = document.getElementById(arg).value;
            if (!Number.isInteger(Number(val))) return false;
            redis_set(arg, val); redis_get('run_number'); return false;
        }

        function ToggleInstanceTable(arg) {
            const area = document.getElementById('Instance State');
            const isHidden = area.style.display === "none";
            area.style.display = isHidden ? "block" : "none";
            arg.value = isHidden ? "HIDE DETAILS" : "DETAILS";
        }

        function UpdateSummaryTable(arg) {
            const services = arg.services;
            while(stateSummaryTable.rows.length > 1) stateSummaryTable.deleteRow(-1);
            services.forEach(obj => {
                const row = stateSummaryTable.insertRow(-1);
                row.insertCell(-1).innerHTML = obj.service;
                const cellN = row.insertCell(-1);
                cellN.innerHTML = obj.n_instances;
                cellN.style.fontWeight = "900"; 
                cellN.style.fontSize = "13px";
                obj.counts.forEach(c => {
                    const cell = row.insertCell(-1);
                    cell.innerHTML = c.value !== 0 ? c.value : '';
                });
                row.insertCell(-1).innerHTML = obj.date;
            });

            while(instStateTable.rows.length > 1) instStateTable.deleteRow(-1);
            if (document.getElementById('buttonInstanceTable').value === 'HIDE DETAILS') {
                services.forEach(srv => {
                    srv.instances.forEach(obj => {
                        const row = instStateTable.insertRow(-1);
                        row.insertCell(-1).innerHTML = obj.service;
                        row.insertCell(-1).innerHTML = obj.instance;
                        row.insertCell(-1).innerHTML = obj.state;
                        row.insertCell(-1).innerHTML = obj.date;
                    });
                });
            }
            UpdateTargetServices({ services: services.map(s => ({name: s.service})), changed: arg.service_list_changed });
            const allInst = [];
            services.forEach(s => s.instances.forEach(i => allInst.push({name: s.service + ':' + i.instance})));
            UpdateTargetInstances({ instances: allInst, changed: arg.instance_list_changed });
        }

        function UpdateTargetServices(arg) {
            const sel = document.getElementById("serviceSelector");
            if (sel.options.length > 0 && arg.changed === 'false') return;
            sel.innerHTML = '<option disabled>Choose Services</option><option selected>all</option>';
            arg.services.forEach((s, i) => sel.add(new Option(s.name, i)));
        }

        function UpdateTargetInstances(arg) {
            const sel = document.getElementById("instanceSelector");
            if (sel.options.length > 0 && arg.changed === 'false') return;
            sel.innerHTML = '<option disabled>Choose Instances</option><option selected>all</option>';
            arg.instances.forEach((inst, i) => sel.add(new Option(inst.name, i)));
        }
    </script>
</body>
</html>
